spring.application.name=demo
spring.port=8080
# ===================================================================
# POSTGRESQL DATABASE CONFIGURATION
# ===================================================================
# Standard JDBC connection URL, username, and password
spring.datasource.url=${DB_URL}
spring.datasource.username==${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# HikariCP Performance Settings
# Keep minimum-idle and maximum-pool-size identical for a fixed-size pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE}

# Connection Management & Timeouts (in milliseconds)
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIME_OUT}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME}

# Security & Diagnostic Utilities
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION_THRESHOLD}