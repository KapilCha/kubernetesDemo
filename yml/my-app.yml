apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app

spec:
  replicas: 4

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - name: my-app

        image: kapilchadockerid/my-app:1.3

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "25m"
            memory: "400Mi"

          limits:
            cpu: "250m"
            memory: "512Mi"

        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5

        env:

        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: DB_URL

        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: DB_USER

        - name: HIKARI_MAX_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_MAX_POOL_SIZE

        - name: HIKARI_MIN_IDLE
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_MIN_IDLE

        - name: HIKARI_CONNECTION_TIME_OUT
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_CONNECTION_TIME_OUT

        - name: HIKARI_IDLE_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_IDLE_TIMEOUT

        - name: HIKARI_MAX_LIFETIME
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_MAX_LIFETIME

        - name: HIKARI_LEAK_DETECTION_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: HIKARI_LEAK_DETECTION_THRESHOLD

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD