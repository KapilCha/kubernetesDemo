apiVersion: v1
kind: ConfigMap
metadata:
  name:  db-config
data:
  DB_URL: jdbc:postgresql://postgres-service:5432/mydb
  DB_USER: postgres
  DB_NAME : mydb
  HIKARI_MAX_POOL_SIZE: "10"
  HIKARI_MIN_IDLE: "5"
  HIKARI_CONNECTION_TIME_OUT: "30000"
  HIKARI_IDLE_TIMEOUT: "600000"
  HIKARI_MAX_LIFETIME: "1800000"
  HIKARI_LEAK_DETECTION_THRESHOLD: "2000"